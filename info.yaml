# Tiny Tapeout project information
project:
  title:        "Epoch Event Scheduler"      # Project title
  author:       "Shane Stearns"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A programmable epoch-based event scheduler with window generation and serial debug output"
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_globaltimer_sched"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_globaltimer_sched.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: "Register select bit 0"
  ui[3]: "Register select bit 1"
  ui[4]: "Event select bit 0"
  ui[5]: "Event select bit 1"
  ui[6]: "Write strobe"
  ui[7]: "start scheduler"

  # Outputs
  uo[0]: "Debug serial output"
  uo[1]: "Event active"
  uo[2]: "Event ID bit 0"
  uo[3]: "Event ID bit 1"
  uo[4]: "Window start pulse"
  uo[5]: "Window end pulse"
  uo[6]: "Epoch tick pulse"
  uo[7]: "Epoch end pulse"

  # Bidirectional pins
  uio[0]: "Write data bit 0"
  uio[1]: "Write data bit 1"
  uio[2]: "Write data bit 2"
  uio[3]: "Write data bit 3"
  uio[4]: "Write data bit 4"
  uio[5]: "Write data bit 5"
  uio[6]: "Write data bit 6"
  uio[7]: "Write data bit 7"

# Do not change!
yaml_version: 6
